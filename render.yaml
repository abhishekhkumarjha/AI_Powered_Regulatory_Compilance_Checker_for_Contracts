services:
  - name: complychain
    type: web
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeployTrigger: commit
    healthCheckPath: /api/health
    disk:
      name: complychain-data
      mountPath: /app/backend/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: FRONTEND_ORIGIN
        value: https://ai-powered-regulatory-compliance-ch.vercel.app
      - key: VITE_API_URL
        value: ""
      - key: VITE_CHAIN_ID
        value: "11155111"
      - key: VITE_NETWORK_NAME
        value: Sepolia
      - key: VITE_RPC_URL
        sync: false
      - key: VITE_EXPLORER_URL
        value: https://sepolia.etherscan.io
      - key: VITE_CONTRACT_ADDRESS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_EXECUTABLE
        value: python3
